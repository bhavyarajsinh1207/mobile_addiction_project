<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>{% block title %}Mobile Addiction Predictor{% endblock %}</title>
    
    <!-- Try CDN first, fallback to local -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet" 
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" 
          crossorigin="anonymous">
    
    <!-- Fallback to local if CDN fails -->
    <script>
        // Check if Bootstrap loaded, if not load local
        window.addEventListener('load', function() {
            if (typeof bootstrap === 'undefined') {
                var link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = "{{ url_for('static', filename='lib/bootstrap/css/bootstrap.min.css') }}";
                document.head.appendChild(link);
            }
        });
    </script>
    
    <!-- Font Awesome with fallback -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-gradient sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('home') }}">
                <i class="fas fa-mobile-alt me-2"></i>
                <span class="fw-bold">PhoneAddiction AI</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" 
                           href="{{ url_for('home') }}">
                            <i class="fas fa-home me-1"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'predict' %}active{% endif %}" 
                           href="{{ url_for('predict') }}">
                            <i class="fas fa-chart-line me-1"></i> Predict
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" 
                           href="{{ url_for('dashboard') }}">
                            <i class="fas fa-chart-pie me-1"></i> Dashboard
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="footer bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-2">
                <i class="fas fa-brain me-2"></i>
                Mobile Phone Addiction Risk Prediction using Logistic Regression
            </p>
            <p class="small mb-0 text-muted">
                © 2024 PhoneAddiction AI | For Educational Purposes
            </p>
        </div>
    </footer>
    
    <!-- JS Files with fallback -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
            crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Fallback for JS if CDN fails -->
    <script>
        window.addEventListener('load', function() {
            if (typeof bootstrap === 'undefined') {
                var script = document.createElement('script');
                script.src = "{{ url_for('static', filename='lib/bootstrap/js/bootstrap.bundle.min.js') }}";
                document.body.appendChild(script);
            }
            if (typeof Chart === 'undefined') {
                var script = document.createElement('script');
                script.src = "{{ url_for('static', filename='lib/chartjs/chart.umd.min.js') }}";
                document.body.appendChild(script);
            }
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
